<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Рейтинг марафона</title>
  
  <!-- ИКОНКА -->
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%A0%D0%B5%D0%B9%D1%82%D0%B8%D0%BD%D0%B3%20%D0%BC%D0%B0%D1%80%D0%B0%D1%84%D0%BE%D0%BD%D0%B0%22%2C%22short_name%22%3A%22%D0%A0%D0%B5%D0%B9%D1%82%D0%B8%D0%BD%D0%B3%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F5F7FA%22%2C%22theme_color%22%3A%22%23FF769A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22icon.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Рейтинг марафона">
  <meta name="theme-color" content="#FF769A">
  
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F7FA;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 16px 8px 30px;
      color: #1E2A2E;
    }
    .container { max-width: 650px; margin: 0 auto; }
    h1 { font-size: 1.6rem; font-weight: 800; text-align: center; color: #4D675C; margin-bottom: 4px; }
    .subhead { text-align: center; color: #6B7F74; background: white; display: inline-block; width: auto; margin: 0 auto 16px; padding: 4px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; }
    
    .card {
      background: white;
      border-radius: 24px;
      padding: 14px 12px;
      margin-bottom: 16px;
      border: 1px solid #EDF0F2;
    }
    .card-title {
      font-weight: 700;
      font-size: 1rem;
      color: #FF769A;
      margin-bottom: 10px;
      border-left: 3px solid #FF769A;
      padding-left: 10px;
    }
    .upload-area {
      border: 1.5px dashed #FF769A;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      background: #FFF9FA;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: linear-gradient(135deg, #FF769A, #FF98B5);
      color: white;
      border-radius: 16px;
      padding: 8px 6px;
      flex: 1;
      min-width: 80px;
      text-align: center;
      font-size: 0.7rem;
    }
    .stat-number { font-size: 1.3rem; font-weight: 800; }
    .btn {
      background: #FF769A;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #FF769A;
      color: #FF769A;
    }
    .flex-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .rating-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.7rem;
    }
    .rating-table th, .rating-table td {
      border: 1px solid #E2E8F0;
      padding: 6px 4px;
      text-align: left;
    }
    .rating-table th {
      background: #FF769A;
      color: white;
      font-weight: 600;
    }
    .log-area {
      background: #F0F2F5;
      border-radius: 14px;
      padding: 8px;
      font-size: 0.65rem;
      color: #4D675C;
      margin-top: 12px;
      max-height: 120px;
      overflow-y: auto;
      font-family: monospace;
    }
    footer {
      text-align: center;
      font-size: 0.6rem;
      color: #9CA7A1;
      margin-top: 20px;
      line-height: 1.5;
    }
    footer a {
      color: #FF769A;
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🏆 РЕЙТИНГ МАРАФОНА</h1>
  <div class="subhead">Загрузите CSV-отчёты участников</div>

  <div class="card">
    <div class="card-title">📤 ЗАГРУЗИТЬ ОТЧЁТЫ</div>
    <div class="upload-area" id="uploadArea">
      📂 Нажми или перетащи CSV файлы
    </div>
    <input type="file" id="fileInput" multiple accept=".csv" style="display:none">
    <div class="flex-buttons">
      <button class="btn" id="clearBtn">🗑 Очистить</button>
      <button class="btn btn-outline" id="exportBtn">📎 Excel (XLSX)</button>
    </div>
    <div class="log-area" id="logArea">📌 Лог загрузки</div>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="card">
    <div class="card-title">🍃 НОВИЧКИ (НП и новые супервайзеры)</div>
    <div id="newbieTable">Нет данных</div>
  </div>

  <div class="card">
    <div class="card-title">🔥 ОПЫТНЫЕ (старые супервайзеры / WT)</div>
    <div id="proTable">Нет данных</div>
  </div>

  <footer>
    © 2026 · Разработчик Скрябина Сахаяна · 
    <a href="https://wa.me/+79142609616" target="_blank">📞 WhatsApp</a><br>
    <span style="font-size:0.55rem;">⚡ Данные сохраняются автоматически</span>
  </footer>
</div>

<script>
  const STORAGE_KEY = "leader_rating_final";
  let participants = [];

  function addLog(msg) {
    const log = document.getElementById('logArea');
    const time = new Date().toLocaleTimeString();
    log.innerHTML = `📌 [${time}] ${msg}<br>${log.innerHTML}`;
    if (log.innerHTML.split('<br>').length > 20) log.innerHTML = log.innerHTML.split('<br>').slice(0,20).join('<br>');
  }

  function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { try { participants = JSON.parse(saved); addLog(`Загружено ${participants.length} участников`); } catch(e){} }
    renderAll();
  }

  function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(participants)); }

  // Функция чтения CSV с автодетектом кодировки
  function readCSVWithEncoding(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        let text = e.target.result;
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        else if (text.charCodeAt(0) === 0xFFFE) {
          const uint16 = new Uint16Array(e.target.result);
          text = new TextDecoder("utf-16le").decode(uint16);
        }
        resolve(text);
      };
      reader.readAsText(file, "UTF-8");
    });
  }

  function getParticipantStatus(p) {
    if (p.role === 'Новичок') {
      if (p.status && (p.status.toLowerCase().includes('супер'))) return 'новый супервайзер';
      if (p.discount === 25) return '25%';
      if (p.discount === 35) return '35%';
      if (p.discount === 42) return '42%';
      return '—';
    } else {
      if (p.tabTeam === 'WT' || (p.tabTeam && p.tabTeam.toLowerCase().includes('world'))) return 'World Team';
      return 'старый супервайзор';
    }
  }

  function parseCSV(text, fileName) {
    addLog(`📄 ${fileName}`);
    const lines = text.split(/\r?\n/);
    let p = { name: "", role: "", consultant: "", tabTeam: "", stars: 0, discount: 0, status: "" };
    for (let line of lines) {
      const l = line.toLowerCase();
      if ((l.includes('фио') || l.includes('имя')) && !p.name) {
        const parts = line.split(';');
        if (parts[1]) p.name = parts[1].replace(/"/g, '').trim();
        if (p.name) addLog(`  → Имя: ${p.name}`);
      }
      if ((l.includes('роль') || l.includes('новичок') || l.includes('опытный')) && !p.role) {
        if (l.includes('новичок')) p.role = 'Новичок';
        else if (l.includes('опытный')) p.role = 'Опытный';
        if (p.role) addLog(`  → Роль: ${p.role}`);
      }
      if ((l.includes('консультант') || l.includes('куратор')) && !p.consultant) {
        const parts = line.split(';');
        if (parts[1]) p.consultant = parts[1].replace(/"/g, '').trim();
        if (p.consultant) addLog(`  → Консультант: ${p.consultant}`);
      }
      if ((l.includes('tab team') || l.includes('вышестоящий')) && !p.tabTeam) {
        const parts = line.split(';');
        if (parts[1]) p.tabTeam = parts[1].replace(/"/g, '').trim();
        if (p.tabTeam) addLog(`  → Tab Team: ${p.tabTeam}`);
      }
      if (l.includes('скидка') && p.discount === 0) {
        const parts = line.split(';');
        for (let part of parts) {
          let num = parseInt(part.replace(/"/g, ''));
          if (!isNaN(num) && (num === 25 || num === 35 || num === 42)) { p.discount = num; addLog(`  → Скидка: ${num}%`); break; }
        }
      }
      if (l.includes('статус') && !p.status) {
        const parts = line.split(';');
        if (parts[1]) p.status = parts[1].replace(/"/g, '').trim().toLowerCase();
        if (p.status) addLog(`  → Статус: ${p.status}`);
      }
      if ((l.includes('звёзд') || l.includes('звезд')) && p.stars === 0) {
        const parts = line.split(';');
        for (let part of parts) {
          let num = parseInt(part.replace(/"/g, ''));
          if (!isNaN(num) && num > 0 && num < 10000) { p.stars = num; addLog(`  → Звёзды: ${p.stars}`); break; }
        }
      }
    }
    if (!p.role) {
      if (text.includes('Выложить макеты')) p.role = 'Новичок';
      else if (text.includes('20 рассылок')) p.role = 'Опытный';
    }
    if (p.name && p.stars > 0) { 
      addLog(`✅ ${p.name} — ${p.stars}⭐ (${getParticipantStatus(p)})`); 
      return p; 
    }
    addLog(`⚠️ Не распознан`);
    return null;
  }

  async function processFiles(files) {
    for (let file of files) {
      if (file.name.endsWith('.csv')) {
        const text = await readCSVWithEncoding(file);
        const p = parseCSV(text, file.name);
        if (p && p.name) {
          const idx = participants.findIndex(ex => ex.name === p.name);
          if (idx !== -1) participants[idx] = p;
          else participants.push(p);
        }
      } else { addLog(`❌ Не CSV: ${file.name}`); }
    }
    saveData();
    renderAll();
  }

  function renderAll() {
    const newbies = participants.filter(p => p.role === 'Новичок').sort((a,b) => b.stars - a.stars);
    const pros = participants.filter(p => p.role === 'Опытный').sort((a,b) => b.stars - a.stars);
    
    const wtCount = pros.filter(p => p.tabTeam === 'WT' || (p.tabTeam && p.tabTeam.toLowerCase().includes('world'))).length;
    const oldSupCount = pros.length - wtCount;
    const discount25 = newbies.filter(p => p.discount === 25).length;
    const discount35 = newbies.filter(p => p.discount === 35).length;
    const discount42 = newbies.filter(p => p.discount === 42).length;
    const newSupCount = newbies.filter(p => p.status && p.status.toLowerCase().includes('супер')).length;
    
    let statsHtml = `
      <div class="stat-box"><div class="stat-number">${newbies.length}</div><div>🍃 Новички</div></div>
      <div class="stat-box"><div class="stat-number">${pros.length}</div><div>🔥 Опытные</div></div>
      <div class="stat-box"><div class="stat-number">${oldSupCount}</div><div>👔 Старые суперв.</div></div>
      <div class="stat-box"><div class="stat-number">${wtCount}</div><div>🌍 WT</div></div>
      <div class="stat-box"><div class="stat-number">${discount25}</div><div>💚 25%</div></div>
      <div class="stat-box"><div class="stat-number">${discount35}</div><div>💛 35%</div></div>
      <div class="stat-box"><div class="stat-number">${discount42}</div><div>🧡 42%</div></div>
      <div class="stat-box"><div class="stat-number">${newSupCount}</div><div>⭐ Новые суперв.</div></div>
    `;
    document.getElementById('statsGrid').innerHTML = statsHtml;
    
    // Таблица для новичков со статусом
    let newbieHtml = `<table class="rating-table"><thead><tr><th>#</th><th>Участник</th><th>Консультант</th><th>Статус / Скидка</th><th>Tab Team</th><th>⭐</th></tr></thead><tbody>`;
    newbies.forEach((p,i) => { 
      newbieHtml += `<tr><td style="width:40px;">${i+1}</td><td style="word-break:break-word;">${escapeHtml(p.name)}</td><td style="word-break:break-word;">${escapeHtml(p.consultant)}</td><td style="word-break:break-word;">${escapeHtml(getParticipantStatus(p))}</td><td style="word-break:break-word;">${escapeHtml(p.tabTeam)}</td><td style="text-align:center;"><b>${p.stars}</b></td>`;
    });
    newbieHtml += `</tbody>`;
    if (!newbies.length) newbieHtml = '<div style="text-align:center; color:#999;">Нет отчётов новичков</div>';
    document.getElementById('newbieTable').innerHTML = newbieHtml;
    
    // Таблица для опытных со статусом
    let proHtml = `<table class="rating-table"><thead><tr><th>#</th><th>Участник</th><th>Консультант</th><th>Статус</th><th>Tab Team</th><th>⭐</th></tr></thead><tbody>`;
    pros.forEach((p,i) => { 
      proHtml += `<tr><td style="width:40px;">${i+1}</td><td style="word-break:break-word;">${escapeHtml(p.name)}</td><td style="word-break:break-word;">${escapeHtml(p.consultant)}</td><td style="word-break:break-word;">${escapeHtml(getParticipantStatus(p))}</td><td style="word-break:break-word;">${escapeHtml(p.tabTeam)}</td><td style="text-align:center;"><b>${p.stars}</b></td>`;
    });
    proHtml += `</tbody>`;
    if (!pros.length) proHtml = '<div style="text-align:center; color:#999;">Нет отчётов опытных</div>';
    document.getElementById('proTable').innerHTML = proHtml;
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  function clearData() { if (confirm('Удалить все данные?')) { participants = []; saveData(); renderAll(); addLog('🗑 Очищено'); } }

  function exportToXLSX() {
    const newbies = participants.filter(p => p.role === 'Новичок').sort((a,b) => b.stars - a.stars);
    const pros = participants.filter(p => p.role === 'Опытный').sort((a,b) => b.stars - a.stars);
    
    const wtCount = pros.filter(p => p.tabTeam === 'WT' || (p.tabTeam && p.tabTeam.toLowerCase().includes('world'))).length;
    const oldSupCount = pros.length - wtCount;
    const discount25 = newbies.filter(p => p.discount === 25).length;
    const discount35 = newbies.filter(p => p.discount === 35).length;
    const discount42 = newbies.filter(p => p.discount === 42).length;
    const newSupCount = newbies.filter(p => p.status && p.status.toLowerCase().includes('супер')).length;
    
    let data = [
      ["ОБЩИЙ РЕЙТИНГ МАРАФОНА"],
      ["Дата выгрузки:", new Date().toLocaleString()],
      [],
      ["🍃 НОВИЧКИ (НП и новые супервайзоры)"]
      ["№", "Участник", "Консультант", "Статус / Скидка", "Tab Team", "⭐ Звёзды"]
    ];
    newbies.forEach((p,i) => { data.push([i+1, p.name, p.consultant, getParticipantStatus(p), p.tabTeam, p.stars]); });
    if (newbies.length === 0) data.push(["Нет данных"]);
    data.push([]);
    data.push(["🔥 ОПЫТНЫЕ (старые супервайзоры / WT)"]);
    data.push(["№", "Участник", "Консультант", "Статус", "Tab Team", "⭐ Звёзды"]);
    pros.forEach((p,i) => { data.push([i+1, p.name, p.consultant, getParticipantStatus(p), p.tabTeam, p.stars]); });
    if (pros.length === 0) data.push(["Нет данных"]);
    data.push([]);
    data.push(["📊 РАЗВЁРНУТАЯ СТАТИСТИКА"]);
    data.push(["Показатель", "Значение"]);
    data.push(["Всего участников:", participants.length]);
    data.push(["Всего звёзд (новички):", newbies.reduce((s,p)=>s+p.stars,0)]);
    data.push(["Всего звёзд (опытные):", pros.reduce((s,p)=>s+p.stars,0)]);
    data.push(["Старые супервайзоры (опытные):", oldSupCount]);
    data.push(["World Team (опытные):", wtCount]);
    data.push(["Новые супервайзоры (новички):", newSupCount]);
    data.push(["Скидка 25% (новички):", discount25]);
    data.push(["Скидка 35% (новички):", discount35]);
    data.push(["Скидка 42% (новички):", discount42]);
    
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:8},{wch:32},{wch:22},{wch:20},{wch:20},{wch:10}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Рейтинг");
    XLSX.writeFile(wb, `rating_${new Date().toISOString().slice(0,10)}.xlsx`);
    addLog('📎 Выгружено в XLSX');
  }

  document.getElementById('uploadArea').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('uploadArea').addEventListener('dragover', e => { e.preventDefault(); document.getElementById('uploadArea').style.borderColor = '#4D675C'; });
  document.getElementById('uploadArea').addEventListener('dragleave', () => document.getElementById('uploadArea').style.borderColor = '#FF769A');
  document.getElementById('uploadArea').addEventListener('drop', async e => { e.preventDefault(); document.getElementById('uploadArea').style.borderColor = '#FF769A'; await processFiles(Array.from(e.dataTransfer.files)); });
  document.getElementById('fileInput').addEventListener('change', async e => { await processFiles(Array.from(e.target.files)); e.target.value = ''; });
  document.getElementById('clearBtn').addEventListener('click', clearData);
  document.getElementById('exportBtn').addEventListener('click', exportToXLSX);
  loadData();
</script>
</body>
</html>
